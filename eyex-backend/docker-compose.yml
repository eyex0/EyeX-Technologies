services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eyex-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./app:/app/app
    networks:
      - eyex-network

  postgres:
    image: postgres:16-alpine
    container_name: eyex-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: eyex
      POSTGRES_PASSWORD: eyex_password
      POSTGRES_DB: eyex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eyex"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eyex-network

  redis:
    image: redis:7-alpine
    container_name: eyex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eyex-network

volumes:
  postgres_data:
  redis_data:

networks:
  eyex-network:
    driver: bridge
